<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <title>GamerZone - Payment Methods</title>
    <style>
        :root {
            --primary-red: #ff3d44;
            --bg-dark: #070707;
            --card-bg: #1a1a1a;
            --input-bg: #252525;
        }

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
        }

        /* --- Header --- */
        .main-header {
            background-color: var(--card-bg);
            border-bottom: 2px solid var(--primary-red);
            padding: 0 40px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 24px; font-weight: 900; color: var(--primary-red);
            text-decoration: none; display: flex; align-items: center; gap: 12px;
        }

        .logo-dot { height: 14px; width: 14px; background-color: var(--primary-red); border-radius: 50%; }

        .payment-container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 50px;
        }

        /* --- Payment Form Style --- */
        .form-control {
            width: 100%; background: var(--input-bg); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px; border-radius: 8px; color: #fff; outline: none; box-sizing: border-box;
            margin-top: 8px;
        }

        .btn-pay {
            background: var(--primary-red); color: #fff; width: 100%; padding: 15px;
            border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase;
            cursor: pointer; margin-top: 30px; transition: 0.3s;
        }

        /* --- FIXED FLIP CARD SECTION --- */
        .card-preview-section {
            background: var(--card-bg); padding: 40px 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; gap: 40px;
        }

        .flip-card {
            background-color: transparent;
            width: 320px;   /* عرض ثابت */
            height: 200px;  /* ارتفاع متناسب */
            perspective: 1000px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card:hover .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(255, 61, 68, 0.2);
            overflow: hidden;
        }

        /* Front Side */
        .flip-card-front {
            background: linear-gradient(135deg, #1a1a1a 0%, #070707 50%, #4d0b0d 100%);
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-sizing: border-box;
        }

        .flip-card-front::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--primary-red) 0.5px, transparent 0.5px);
            background-size: 15px 15px; opacity: 0.1; pointer-events: none;
        }

        /* Back Side */
        .flip-card-back {
            background: linear-gradient(135deg, #4d0b0d 0%, #070707 100%);
            transform: rotateY(180deg);
            padding: 0;
        }

        /* Card Elements Positioning */
        .card-label { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 1.5px; margin-bottom: 5px; }
        
        .chip { width: 45px; height: auto; margin-bottom: 20px; }
        
        .card-number {
            font-size: 1.2rem;
            letter-spacing: 3px;
            font-weight: 700;
            margin-bottom: auto;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .card-holder-name { font-size: 0.8rem; text-transform: uppercase; font-weight: bold; }
        .card-expiry { font-size: 0.8rem; font-weight: bold; }

        .mastercard-logo { width: 50px; }

        /* Back Elements */
        .black-strip { background: #000; width: 100%; height: 45px; margin-top: 25px; }
        .cvv-section {
            background: #fff; width: 80%; height: 35px; margin: 20px auto;
            border-radius: 4px; display: flex; align-items: center; justify-content: flex-end;
            padding-right: 15px; color: #000; font-weight: bold; font-style: italic;
        }

        @media (max-width: 992px) {
            .payment-container { grid-template-columns: 1fr; }
            .card-preview-section { order: -1; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="home.html" class="logo"><div class="logo-dot"></div> GAMERZONE</a>
        <span style="color: #777;">CHECKOUT</span>
    </header>

    <div class="payment-container">
        <main>
            <h2 style="border-left: 4px solid var(--primary-red); padding-left: 15px; text-transform: uppercase;">Payment Details</h2>
            
            <div style="margin-top: 30px;">
                <div style="margin-bottom: 20px;">
                    <label>CARDHOLDER NAME</label>
                    <input type="text" class="form-control" placeholder="BRUCE WAYNE">
                </div>
                <div style="margin-bottom: 20px;">
                    <label>CARD NUMBER</label>
                    <input type="text" class="form-control" placeholder="9759 2484 5269 6576">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label>EXPIRY DATE</label>
                        <input type="text" class="form-control" placeholder="MM / YY">
                    </div>
                    <div>
                        <label>CVV</label>
                        <input type="password" class="form-control" placeholder="***">
                    </div>
                </div>
            </div>
            <button class="btn-pay">Complete Purchase</button>
        </main>

        <aside class="card-preview-section">
            <div class="flip-card">
                <div class="flip-card-inner">
                    <div class="flip-card-front">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <img src="https://cdn-icons-png.flaticon.com/512/6404/6404078.png" class="chip" alt="chip">
                            <span style="font-size: 10px; font-weight: 900; color: var(--primary-red); letter-spacing: 2px;">GAMER CARD</span>
                        </div>
                        
                        <div class="card-number">9759 2484 5269 6576</div>
                        
                        <div class="card-footer">
                            <div>
                                <div class="card-label">HOLDER</div>
                                <div class="card-holder-name">BRUCE WAYNE</div>
                            </div>
                            <div style="text-align: right;">
                                <div class="card-label">EXPIRES</div>
                                <div class="card-expiry">12 / 26</div>
                            </div>
                            <svg class="mastercard-logo" viewBox="0 0 48 48" width="45">
                                <path fill="#ff9800" d="M32 10A14 14 0 1 0 32 38A14 14 0 1 0 32 10Z"></path>
                                <path fill="#d50000" d="M16 10A14 14 0 1 0 16 38A14 14 0 1 0 16 10Z"></path>
                            </svg>
                        </div>
                    </div>
                    
                    <div class="flip-card-back">
                        <div class="black-strip"></div>
                        <div style="padding: 20px;">
                            <div class="card-label" style="margin-left: 35px;">CVV / CVC</div>
                            <div class="cvv-section">123</div>
                            <p style="font-size: 8px; color: rgba(255,255,255,0.3); text-align: center; line-height: 1.4;">
                                This card is property of GamerZone Bank. Use is subject to terms and conditions. If found, please return to any GamerZone branch.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div style="text-align: center;">
                <p style="color: #777; font-size: 13px;">Hover card to see back side</p>
                <div style="font-size: 24px; font-weight: 900; margin-top: 10px;">Total: $69.99</div>
            </div>
        </aside>
    </div>

</body>
</html>
